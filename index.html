<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMoney Expense Manager</title>
  
  <!-- Tailwind CSS CDN for high-end modern styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDNs to run modern component interfaces -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel compiler to compile JSX live in the browser without local build tools -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    /* Hide scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased selection:bg-indigo-500/30 selection:text-indigo-200">

  <!-- Target root div where our compiled React app mounts -->
  <div id="root"></div>

  <!-- React JSX Logic block -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- STREAMING_CHUNK:Configuring currency and inline SVG icons... ---
    // Storing base expenses in Indian Rupee (INR)
    const EXCHANGE_RATES = {
      INR: 1,
      USD: 0.012, 
      EUR: 0.011, 
      GBP: 0.0095 
    };

    const CURRENCY_SYMBOLS = {
      INR: '₹',
      USD: '$',
      EUR: '€',
      GBP: '£'
    };

    // Lightweight, bulletproof inline SVG Icon Component to replace heavy packages
    function Icon({ name, className = "w-5 h-5", size = 20 }) {
      const paths = {
        coins: <path d="M11 15h2m-2-3h2m-2-3h2M3 12a9 9 0 1 1 18 0 9 9 0 0 1-18 0z" />,
        wallet: <path d="M21 12V7H5a2 2 0 0 1 0-4h14M3 11v9a2 2 0 0 0 2 2h16a1 1 0 0 0 1-1V12a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1z" />,
        users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m8-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm14-2a4 4 0 0 0-3-3.87m0 7.75A4 4 0 0 0 22 12m-5-6a3 3 0 1 0-3 3" />,
        shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
        lock: <path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zm-12 0V7a5 5 0 0 1 10 0v4" />,
        plus: <path d="M12 5v14M5 12h14" />,
        trash: <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6m4-6v6" />,
        userPlus: <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m8-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm11 1h6m-3-3v6" />,
        logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9" />,
        user: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2m8-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
        chevronRight: <path d="M9 18l6-6-6-6" />,
        menu: <path d="M4 6h16M4 12h16M4 18h16" />,
        x: <path d="M18 6L6 18M6 6l12 12" />,
        check: <path d="M20 6L9 17l-5-5" />,
        eye: <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
        alertCircle: <path d="M12 8v4m0 4h.01M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z" />,
        play: <path d="M5 3l14 9-14 9V3z" />
      };

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {paths[name] || null}
        </svg>
      );
    }

    // --- STREAMING_CHUNK:App component entry definition... ---
    function App() {
      // Initialize Supabase configuration checks from localStorage
      const [supabaseLoaded, setSupabaseLoaded] = useState(false);
      const [supabaseConfig, setSupabaseConfig] = useState(() => {
        const savedUrl = localStorage.getItem('TRAVEL_SUPABASE_URL') || '';
        const savedKey = localStorage.getItem('TRAVEL_SUPABASE_KEY') || '';
        return { url: savedUrl, key: savedKey };
      });
      const [isConfigured, setIsConfigured] = useState(!!(supabaseConfig.url && supabaseConfig.key));
      const [configError, setConfigError] = useState('');
      
      // Fallback sandbox play mode in case they have not populated keys yet
      const [isDemoMode, setIsDemoMode] = useState(!isConfigured);
      
      // Database structures
      const [appUsers, setAppUsers] = useState([]); 
      const [expenses, setExpenses] = useState([]);
      const [dataLoaded, setDataLoaded] = useState(false);
      
      // Active credential logic (Read from localStorage so they remain logged in across laptop/mobile!)
      const [loggedInUser, setLoggedInUser] = useState(() => {
        const savedSession = localStorage.getItem('TRAVEL_LOGGED_IN_USER');
        return savedSession ? JSON.parse(savedSession) : null;
      }); 
      const [loginForm, setLoginForm] = useState({ username: '', password: '' });
      const [setupForm, setSetupForm] = useState({ username: '', password: '' });
      const [authError, setAuthError] = useState('');
      
      // Side-by-side UI Drawer structures
      const [activeTab, setActiveTab] = useState('group'); 
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [newExpense, setNewExpense] = useState({ amount: '', description: '', paidBy: '' });
      const [newFriend, setNewFriend] = useState({ username: '', password: '' });
      const [uiError, setUiError] = useState('');
      const [viewCurrency, setViewCurrency] = useState('INR'); // Defaults to Indian Rupee (₹)

      // --- STREAMING_CHUNK:Loading database CDN modules dynamically... ---
      useEffect(() => {
        if (window.supabase) {
          setSupabaseLoaded(true);
          return;
        }
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.async = true;
        script.onload = () => {
          setSupabaseLoaded(true);
        };
        document.body.appendChild(script);
      }, []);

      const getSupabaseClient = () => {
        if (!supabaseLoaded || !window.supabase || !supabaseConfig.url || !supabaseConfig.key) {
          return null;
        }
        try {
          return window.supabase.createClient(supabaseConfig.url, supabaseConfig.key);
        } catch (e) {
          console.error(e);
          return null;
        }
      };

      const handleSaveConfig = (e) => {
        e.preventDefault();
        setConfigError('');
        if (!supabaseConfig.url || !supabaseConfig.key) {
          setConfigError('Both credentials are required to verify the server handshake.');
          return;
        }
        
        try {
          const client = window.supabase.createClient(supabaseConfig.url, supabaseConfig.key);
          if (client) {
            localStorage.setItem('TRAVEL_SUPABASE_URL', supabaseConfig.url);
            localStorage.setItem('TRAVEL_SUPABASE_KEY', supabaseConfig.key);
            setIsConfigured(true);
            setIsDemoMode(false);
            setDataLoaded(false);
          }
        } catch (err) {
          setConfigError('Invalid Supabase Connection Configuration URL structure.');
        }
      };

      // --- STREAMING_CHUNK:Designing data loading strategies... ---
      const fetchUsers = async () => {
        const supabaseClient = getSupabaseClient();
        if (!supabaseClient || isDemoMode) {
          const demoUsers = JSON.parse(localStorage.getItem('DEMO_USERS')) || [];
          setAppUsers(demoUsers);
          return;
        }
        try {
          const { data, error } = await supabaseClient
            .from('app_users')
            .select('*');
          if (error) throw error;
          setAppUsers(data || []);
        } catch (err) {
          console.error("Error fetching database users:", err.message);
        }
      };

      const fetchExpenses = async () => {
        const supabaseClient = getSupabaseClient();
        if (!supabaseClient || isDemoMode) {
          const demoExpenses = JSON.parse(localStorage.getItem('DEMO_EXPENSES')) || [];
          setExpenses(demoExpenses);
          return;
        }
        try {
          const { data, error } = await supabaseClient
            .from('expenses')
            .select('*')
            .order('timestamp', { ascending: false });
          if (error) throw error;
          setExpenses(data || []);
        } catch (err) {
          console.error("Error fetching database expenses:", err.message);
        }
      };

      useEffect(() => {
        if (!supabaseLoaded) return;

        const loadAll = async () => {
          await Promise.all([fetchUsers(), fetchExpenses()]);
          setDataLoaded(true);
        };
        loadAll();

        // Bind live server real-time sync listeners
        const client = getSupabaseClient();
        if (client && !isDemoMode) {
          const usersSubscription = client
            .channel('public:app_users')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'app_users' }, () => {
              fetchUsers();
            })
            .subscribe();

          const expensesSubscription = client
            .channel('public:expenses')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, () => {
              fetchExpenses();
            })
            .subscribe();

          return () => {
            client.removeChannel(usersSubscription);
            client.removeChannel(expensesSubscription);
          };
        }
      }, [supabaseLoaded, isConfigured, isDemoMode]);

      // --- STREAMING_CHUNK:Implementing account creations and logins... ---
      const handleSetupAdmin = async (e) => {
        e.preventDefault();
        setAuthError('');
        if (!setupForm.username || !setupForm.password) return;

        const adminUsername = setupForm.username.trim();
        const adminPassword = setupForm.password;

        if (isDemoMode) {
          const newAdmin = {
            id: 'admin-' + Date.now(),
            username: adminUsername,
            password: adminPassword,
            role: 'admin',
            created_at: Date.now()
          };
          const currentUsers = [newAdmin, ...appUsers];
          localStorage.setItem('DEMO_USERS', JSON.stringify(currentUsers));
          setAppUsers(currentUsers);
          setLoggedInUser(newAdmin);
          localStorage.setItem('TRAVEL_LOGGED_IN_USER', JSON.stringify(newAdmin));
          return;
        }

        try {
          const client = getSupabaseClient();
          const { data, error } = await client
            .from('app_users')
            .insert([
              {
                username: adminUsername,
                password: adminPassword,
                role: 'admin',
                created_at: Date.now()
              }
            ])
            .select();

          if (error) throw error;
          if (data && data.length > 0) {
            setLoggedInUser(data[0]);
            localStorage.setItem('TRAVEL_LOGGED_IN_USER', JSON.stringify(data[0]));
          }
        } catch (err) {
          setAuthError("Failed to deploy Admin credential profile: " + err.message + ". Hint: Make sure you ran the SQL script to turn off RLS in Supabase!");
        }
      };

      const handleLogin = (e) => {
        e.preventDefault();
        setAuthError('');
        const foundUser = appUsers.find(
          u => u.username.toLowerCase() === loginForm.username.trim().toLowerCase() && u.password === loginForm.password
        );

        if (foundUser) {
          setLoggedInUser(foundUser);
          localStorage.setItem('TRAVEL_LOGGED_IN_USER', JSON.stringify(foundUser));
          setLoginForm({ username: '', password: '' });
          setActiveTab('group');
        } else {
          setAuthError("Invalid username credential or password sequence.");
        }
      };

      const handleLogout = () => {
        setLoggedInUser(null);
        localStorage.removeItem('TRAVEL_LOGGED_IN_USER');
        setActiveTab('group');
        setIsSidebarOpen(false);
      };

      // --- STREAMING_CHUNK:Mathematical currency converters... ---
      const formatAmount = (baseAmount) => {
        const rate = EXCHANGE_RATES[viewCurrency];
        const converted = baseAmount * rate;
        return `${CURRENCY_SYMBOLS[viewCurrency]}${converted.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 })}`;
      };

      const showError = (msg) => {
        setUiError(msg);
        setTimeout(() => setUiError(''), 4000);
      };

      // --- STREAMING_CHUNK:Configuring expense transaction controllers... ---
      const handleAddExpense = async (e) => {
        e.preventDefault();
        const amountNum = parseFloat(newExpense.amount);
        if (!amountNum || !newExpense.description) {
          showError("Please specify a valid numeric amount and description.");
          return;
        }

        // Always normalize and save the core transaction ledger inside INR in database
        const baseRate = EXCHANGE_RATES[viewCurrency];
        const amountInBaseINR = amountNum / baseRate;

        let payer = activeTab === 'group' ? newExpense.paidBy : loggedInUser.username;
        if (activeTab === 'group' && !payer) {
          showError("Select a verified friend account who paid this transaction.");
          return;
        }

        if (isDemoMode) {
          const newExp = {
            id: 'exp-' + Date.now(),
            type: activeTab === 'group' ? 'group' : 'personal',
            amount: amountInBaseINR,
            description: newExpense.description,
            paid_by: payer,
            timestamp: Date.now(),
            added_by_uid: loggedInUser.id
          };
          const currentExpenses = [newExp, ...expenses];
          localStorage.setItem('DEMO_EXPENSES', JSON.stringify(currentExpenses));
          setExpenses(currentExpenses);
          setNewExpense({ amount: '', description: '', paidBy: '' });
          return;
        }

        try {
          const client = getSupabaseClient();
          const { error } = await client
            .from('expenses')
            .insert([
              {
                type: activeTab === 'group' ? 'group' : 'personal',
                amount: amountInBaseINR,
                description: newExpense.description,
                paid_by: payer,
                timestamp: Date.now(),
                added_by_uid: loggedInUser.id
              }
            ]);

          if (error) throw error;
          setNewExpense({ amount: '', description: '', paidBy: '' });
        } catch (err) {
          showError("Failed to add transaction record: " + err.message);
        }
      };

      const handleDeleteExpense = async (expenseId) => {
        if (loggedInUser.role !== 'admin') return;
        
        if (isDemoMode) {
          const updated = expenses.filter(e => e.id !== expenseId);
          localStorage.setItem('DEMO_EXPENSES', JSON.stringify(updated));
          setExpenses(updated);
          return;
        }

        try {
          const client = getSupabaseClient();
          const { error } = await client
            .from('expenses')
            .delete()
            .eq('id', expenseId);
          if (error) throw error;
        } catch (err) {
          showError("Failed to delete database entry.");
        }
      };

      // --- STREAMING_CHUNK:Implementing admin friend creation managers... ---
      const handleCreateFriend = async (e) => {
        e.preventDefault();
        if (loggedInUser.role !== 'admin') return;
        if (!newFriend.username || !newFriend.password) return;

        if (appUsers.some(u => u.username.toLowerCase() === newFriend.username.trim().toLowerCase())) {
          showError("User profile name already registered.");
          return;
        }

        if (isDemoMode) {
          const newUsr = {
            id: 'user-' + Date.now(),
            username: newFriend.username.trim(),
            password: newFriend.password,
            role: 'friend',
            created_at: Date.now()
          };
          const updated = [...appUsers, newUsr];
          localStorage.setItem('DEMO_USERS', JSON.stringify(updated));
          setAppUsers(updated);
          setNewFriend({ username: '', password: '' });
          return;
        }

        try {
          const client = getSupabaseClient();
          const { error } = await client
            .from('app_users')
            .insert([
              {
                username: newFriend.username.trim(),
                password: newFriend.password,
                role: 'friend',
                created_at: Date.now()
              }
            ]);

          if (error) throw error;
          setNewFriend({ username: '', password: '' });
        } catch (err) {
          showError("Failed to write user account key: " + err.message);
        }
      };

      const handleDeleteUser = async (userId) => {
        if (loggedInUser.role !== 'admin') return;

        if (isDemoMode) {
          const updated = appUsers.filter(u => u.id !== userId);
          localStorage.setItem('DEMO_USERS', JSON.stringify(updated));
          setAppUsers(updated);
          return;
        }

        try {
          const client = getSupabaseClient();
          const { error } = await client
            .from('app_users')
            .delete()
            .eq('id', userId);
          if (error) throw error;
        } catch (err) {
          showError("Failed to delete user login profile.");
        }
      };

      // --- STREAMING_CHUNK:Derived analytics state... ---
      const visibleExpenses = useMemo(() => {
        if (activeTab === 'group') {
          return expenses.filter(e => e.type === 'group');
        } else if (activeTab === 'personal') {
          if (loggedInUser?.role === 'admin') {
            return expenses.filter(e => e.type === 'personal');
          } else {
            return expenses.filter(e => e.type === 'personal' && e.paid_by === loggedInUser?.username);
          }
        }
        return [];
      }, [expenses, activeTab, loggedInUser]);

      const groupTotal = useMemo(() => {
        return expenses.filter(e => e.type === 'group').reduce((sum, e) => sum + e.amount, 0);
      }, [expenses]);

      const groupExpensesByPerson = useMemo(() => {
        const summary = {};
        appUsers.forEach(u => summary[u.username] = 0);
        expenses.filter(e => e.type === 'group').forEach(exp => {
          if (summary[exp.paid_by] !== undefined) summary[exp.paid_by] += exp.amount;
          else summary[exp.paid_by] = exp.amount;
        });
        return summary;
      }, [expenses, appUsers]);

      const personalTotalsByPerson = useMemo(() => {
        const summary = {};
        expenses.filter(e => e.type === 'personal').forEach(exp => {
          summary[exp.paid_by] = (summary[exp.paid_by] || 0) + exp.amount;
        });
        return summary;
      }, [expenses]);

      // --- STREAMING_CHUNK:Verifying configuration forms UI... ---
      if (!isConfigured && !isDemoMode) {
        return (
          <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4">
            <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl p-8">
              <div className="text-center mb-6">
                <div className="bg-indigo-600/20 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-indigo-500/30">
                  <Icon name="coins" className="text-indigo-400 w-8 h-8" />
                </div>
                <h1 className="text-2xl font-black text-white">Supabase Connection</h1>
                <p className="text-slate-400 text-xs mt-2 leading-relaxed">
                  Connect your online Supabase credentials to save records safely on the cloud database.
                </p>
              </div>

              {configError && (
                <div className="bg-rose-500/10 border border-rose-500/20 text-rose-400 p-3.5 rounded-xl text-xs mb-4 flex items-center gap-2">
                  <Icon name="alertCircle" className="w-4 h-4 text-rose-400" /> {configError}
                </div>
              )}

              <form onSubmit={handleSaveConfig} className="space-y-4">
                <div>
                  <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Supabase Project URL</label>
                  <input
                    type="url"
                    required
                    value={supabaseConfig.url}
                    onChange={e => setSupabaseConfig({...supabaseConfig, url: e.target.value})}
                    placeholder="https://your-project.supabase.co"
                    className="w-full bg-slate-950 border border-slate-800 text-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  />
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Supabase Anon Key</label>
                  <input
                    type="text"
                    required
                    value={supabaseConfig.key}
                    onChange={e => setSupabaseConfig({...supabaseConfig, key: e.target.value})}
                    placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    className="w-full bg-slate-950 border border-slate-800 text-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono"
                  />
                </div>
                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold text-sm transition-all shadow-lg hover:shadow-indigo-500/15">
                  Connect Cloud Server
                </button>
              </form>

              <div className="relative my-6">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-800"></div></div>
                <div className="relative flex justify-center text-xs"><span className="bg-slate-900 px-3 text-slate-500">or play offline</span></div>
              </div>

              <button 
                onClick={() => {
                  setIsDemoMode(true);
                  setIsConfigured(true);
                  setDataLoaded(false);
                }}
                className="w-full bg-slate-850 hover:bg-slate-800 text-slate-300 py-3 rounded-xl font-bold text-sm transition-all border border-slate-800 flex items-center justify-center gap-2"
              >
                <Icon name="play" className="w-4 h-4 text-slate-300" /> Enter Sandbox Demo Playground
              </button>
            </div>
          </div>
        );
      }

      // --- STREAMING_CHUNK:Developing portal authentication screen... ---
      if (!loggedInUser) {
        const hasAdmin = appUsers.some(u => u.role === 'admin');

        return (
          <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4">
            {isDemoMode && (
              <div className="mb-4 bg-amber-500/10 border border-amber-500/20 text-amber-300 text-xs px-4 py-2.5 rounded-xl max-w-md text-center animate-pulse">
                Currently running in <strong>Demo Sandbox Mode</strong>. 
                <button 
                  onClick={() => {
                    setIsConfigured(false);
                    setIsDemoMode(false);
                  }}
                  className="underline font-bold ml-2 text-white hover:text-indigo-400"
                >
                  Connect Supabase Now
                </button>
              </div>
            )}
            <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden">
              <div className="bg-gradient-to-br from-indigo-700 to-blue-600 p-8 text-center text-white">
                <div className="bg-white/15 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-md">
                {hasAdmin ? <Icon name="lock" className="w-8 h-8 text-white" /> : <Icon name="shield" className="w-8 h-8 text-white" />}
              </div>
              <h1 className="text-3xl font-extrabold tracking-tight mb-1">UniMoney Expense Manager</h1>
              <p className="text-blue-100/90 text-sm">
                  {hasAdmin ? "Secure Workspace Credentials" : "Admin Account Setup Needed"}
                </p>
              </div>
              
              <div className="p-8">
                {authError && (
                  <div className="bg-rose-500/10 border border-rose-500/20 text-rose-400 p-3.5 rounded-xl text-sm mb-6 flex flex-col gap-2">
                    <div className="flex items-center gap-2.5">
                      <Icon name="alertCircle" className="w-5 h-5 text-rose-400 shrink-0" /> 
                      <span className="font-bold">Error Occurred</span>
                    </div>
                    <span className="text-xs leading-relaxed">{authError}</span>
                  </div>
                )}

                                    <span className="text-xs text-slate-400">{new Date(expense.timestamp).toLocaleDateString('en-IN')}</span>
                                    
                                    {expense.type === 'personal' && loggedInUser.role === 'admin' && (
                                      <>
                                        <span className="text-slate-700">•</span>
                                        <span className="text-[9px] bg-indigo-500/10 border border-indigo-500/25 text-indigo-400 px-1.5 py-0.5 rounded-md font-bold uppercase tracking-wider flex items-center gap-1">
                                          <Icon name="eye" className="w-3 h-3 text-indigo-400" /> Private
                                        </span>
                                      </>
                                    )}
                                  </div>
                                </div>
                              </div>
                              
                              <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto pl-15 sm:pl-0">
                                <span className="font-extrabold text-white text-lg tracking-tight">
                                  {formatAmount(expense.amount)}
                                </span>
                                
                                {loggedInUser.role === 'admin' && (
                                  <button
                                    onClick={() => handleDeleteExpense(expense.id)}
                                    className="text-slate-600 hover:text-rose-400 hover:bg-rose-500/10 p-2 rounded-xl transition-all border border-transparent hover:border-rose-500/10 lg:opacity-0 group-hover:opacity-100"
                                    title="Delete Expense"
                                  >
                                    <Icon name="trash" className="w-4.5 h-4.5" />
                                  </button>
                                )}
                              </div>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- STREAMING_CHUNK:Mounting React application... ---
    // Finalize rendering the compiled component to DOM
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
