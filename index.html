<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>UniMoney Expense Manager</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: #0f172a; margin: 0; overscroll-behavior-y: none; padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(16px); border-top: 1px solid rgba(255,255,255,0.05); }

        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-tab { animation: fadeSlideUp 0.3s ease-out forwards; }
        
        /* Hide sidebar scrollbar */
        aside::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // =========================================================================
        // SUPABASE CONFIGURATION
        // =========================================================================
        const SUPABASE_URL = "https://pdurzxmsjjwlhwaucakl.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkdXJ6eG1zamp3bGh3YXVjYWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTA3ODEsImV4cCI6MjA5NTg4Njc4MX0.e4VAMmx8J7AX3Cx5N5ZRq5-RnY5b4GURzYylLSmXfSY";

        const GDRIVE_LINK = "https://drive.google.com/drive/folders/1mLGkLtoEXu9h34UHdBrP6d39UdJfHVIz?usp=drive_link";
        // =========================================================================

        const { useState, useEffect, useMemo } = React;

        const EXCHANGE_RATES = { INR: 1, USD: 0.012, EUR: 0.011, GBP: 0.0095 };
        const CURRENCY_SYMBOLS = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };

        const THEMES = {
            blue: { main: 'bg-blue-600', hover: 'hover:bg-blue-500', text: 'text-blue-400', border: 'border-blue-500/30', shadow: 'shadow-blue-500/20', light: 'bg-blue-500/20' },
            indigo: { main: 'bg-indigo-600', hover: 'hover:bg-indigo-500', text: 'text-indigo-400', border: 'border-indigo-500/30', shadow: 'shadow-indigo-500/20', light: 'bg-indigo-500/20' },
            emerald: { main: 'bg-emerald-600', hover: 'hover:bg-emerald-500', text: 'text-emerald-400', border: 'border-emerald-500/30', shadow: 'shadow-emerald-500/20', light: 'bg-emerald-500/20' },
            amber: { main: 'bg-amber-600', hover: 'hover:bg-amber-500', text: 'text-amber-400', border: 'border-amber-500/30', shadow: 'shadow-amber-500/20', light: 'bg-amber-500/20' },
        };

        function App() {
            const keysAreMissing = SUPABASE_URL.includes("YOUR_SUPABASE_URL_HERE") || SUPABASE_ANON_KEY.includes("YOUR_SUPABASE_ANON_KEY_HERE");

            const [supabase, setSupabase] = useState(null);
            const [isLoading, setIsLoading] = useState(true); // Fixes the "stuck on setup" issue
            const [appUsers, setAppUsers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [loggedInUser, setLoggedInUser] = useState(null);

            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [setupForm, setSetupForm] = useState({ username: '', password: '' });
            const [authError, setAuthError] = useState('');

            const [activeTab, setActiveTab] = useState('group');
            // Added 'source' for deduction logic
            const [newExpense, setNewExpense] = useState({ amount: '', description: '', paidBy: '', source: 'account' });
            const [newFriend, setNewFriend] = useState({ username: '', password: '' });
            const [uiError, setUiError] = useState('');
            const [viewCurrency, setViewCurrency] = useState('INR');

            const [appTheme, setAppTheme] = useState(localStorage.getItem('unimoney_theme') || 'blue');
            const t = THEMES[appTheme] || THEMES.blue;

            // Business & Personal Balances
            const [bizTab, setBizTab] = useState('sale');
            const [bizSaleForm, setBizSaleForm] = useState({ name: '', qty: 1, buy: '', exp: 0, sell: '', date: new Date().toISOString().split('T')[0] });
            const [bizExpForm, setBizExpForm] = useState({ description: '', amount: '', source: 'account', date: new Date().toISOString().split('T')[0] });
            
            const [bizBalances, setBizBalances] = useState({ cash: 0, account: 0 });
            const [personalBalances, setPersonalBalances] = useState({ cash: 0, account: 0 });
            
            const [khataForm, setKhataForm] = useState({ mode: 'take', name: '', amount: '', date: new Date().toISOString().split('T')[0] });

            useEffect(() => {
                if (!keysAreMissing) {
                    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    setSupabase(sbClient);
                }
            }, []);

            const fetchData = async () => {
                if (!supabase) return;

                const { data: usersData, error: usersErr } = await supabase.from('app_users').select('*');
                if (!usersErr && usersData) {
                    setAppUsers(usersData);
                    const savedUserId = localStorage.getItem('unimoney_user_id');
                    if (savedUserId) {
                        const foundUser = usersData.find(u => String(u.id) === String(savedUserId));
                        if (foundUser) setLoggedInUser(foundUser);
                    }
                }

                const { data: expData, error: expErr } = await supabase.from('expenses').select('*').order('timestamp', { ascending: false });
                if (!expErr && expData) setExpenses(expData);
                
                setIsLoading(false); // Stop loading once data is fetched
            };

            useEffect(() => { fetchData(); }, [supabase]);

            // Sync Balances from DB dynamically
            useEffect(() => {
                if (loggedInUser && expenses.length > 0) {
                    // Sync Personal Balances
                    const myPersonalBal = expenses.filter(e => e.type === 'user_balance' && e.paid_by === loggedInUser.username);
                    if (myPersonalBal.length > 0) {
                        try {
                            const parsed = JSON.parse(myPersonalBal[0].description);
                            setPersonalBalances({ cash: parsed.cash || 0, account: parsed.account || 0 });
                        } catch(e) {}
                    }
                    // Sync Biz Balances (Admin only)
                    if (loggedInUser.role === 'admin') {
                        const myBizBal = expenses.filter(e => e.type === 'biz_bal' && e.paid_by === loggedInUser.username);
                        if (myBizBal.length > 0) {
                            try {
                                const parsed = JSON.parse(myBizBal[0].description);
                                setBizBalances({ cash: parsed.cash || 0, account: parsed.account || 0 });
                            } catch(e) {}
                        }
                    }
                }
            }, [loggedInUser, expenses]);

            const handleSetupAdmin = async (e) => {
                e.preventDefault();
                setAuthError('');
                const reqUsername = setupForm.username.trim().toLowerCase();
                
                // Strict Admin Lock
                if (reqUsername !== 'amit') {
                    return setAuthError("Security Lock: Only the developer 'Amit' can initialize the Master Admin workspace.");
                }

                try {
                    // Double check if admin exists to prevent duplicates
                    const { data: existingAdmins } = await supabase.from('app_users').select('*').eq('role', 'admin');
                    if (existingAdmins && existingAdmins.length > 0) return setAuthError("Admin account already exists in database.");

                    const { data, error } = await supabase.from('app_users').insert([{
                        username: setupForm.username.trim(),
                        password: setupForm.password,
                        role: 'admin',
                        created_at: Date.now()
                    }]).select();
                    if (error) throw error;
                    setLoggedInUser(data[0]);
                    localStorage.setItem('unimoney_user_id', data[0].id);
                    await fetchData();
                } catch (err) { setAuthError(err.message || "Failed to setup Admin."); }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setAuthError('');
                const foundUser = appUsers.find(
                    u => u.username.toLowerCase() === loginForm.username.trim().toLowerCase() && u.password === loginForm.password
                );
                if (foundUser) {
                    setLoggedInUser(foundUser);
                    localStorage.setItem('unimoney_user_id', foundUser.id);
                    setLoginForm({ username: '', password: '' });
                    setActiveTab('group');
                } else { setAuthError("Invalid credentials."); }
            };

            const handleLogout = () => {
                setLoggedInUser(null);
                localStorage.removeItem('unimoney_user_id');
                setActiveTab('group');
            };

            const formatAmount = (baseAmount) => {
                const rate = EXCHANGE_RATES[viewCurrency];
                const converted = baseAmount * rate;
                return `${CURRENCY_SYMBOLS[viewCurrency]}${converted.toFixed(2)}`;
            };

            const showError = (msg) => {
                setUiError(msg);
                setTimeout(() => setUiError(''), 4000);
            };

            const pushBalanceUpdate = async (type, balancesObj) => {
                await supabase.from('expenses').insert([{
                    type: type,
                    amount: 0,
                    description: JSON.stringify(balancesObj),
                    paid_by: loggedInUser.username,
                    timestamp: Date.now()
                }]);
            };

            const handleAddExpense = async (e) => {
                e.preventDefault();
                const amountNum = parseFloat(newExpense.amount);
                if (!amountNum || !newExpense.description) return showError("Please fill amount and description.");

                const baseRate = EXCHANGE_RATES[viewCurrency];
                const amountInBaseINR = amountNum / baseRate;
                let payer = loggedInUser.username;

                if (activeTab === 'group' && loggedInUser.role === 'admin') {
                    if (!newExpense.paidBy) return showError("Please select who paid.");
                    payer = newExpense.paidBy;
                }

                try {
                    const expenseType = activeTab === 'group' ? 'group' : 'personal';
                    await supabase.from('expenses').insert([{
                        type: expenseType,
                        amount: amountInBaseINR,
                        description: newExpense.description,
                        paid_by: payer,
                        timestamp: Date.now()
                    }]);

                    // DEDUCTION LOGIC FOR PERSONAL EXPENSE
                    if (expenseType === 'personal') {
                        const updatedBalances = { ...personalBalances };
                        if (newExpense.source === 'cash') {
                            updatedBalances.cash = parseFloat((updatedBalances.cash - amountInBaseINR).toFixed(2));
                        } else {
                            updatedBalances.account = parseFloat((updatedBalances.account - amountInBaseINR).toFixed(2));
                        }
                        setPersonalBalances(updatedBalances);
                        await pushBalanceUpdate('user_balance', updatedBalances);
                    }

                    setNewExpense({ amount: '', description: '', paidBy: '', source: 'account' });
                    showError(expenseType === 'personal' ? `✅ Expense Added & Deducted from ${newExpense.source}!` : "✅ Expense Added!");
                    await fetchData(); 
                } catch (err) { showError("Failed to add expense."); }
            };

            const handleSavePersonalBalances = async (e) => {
                e.preventDefault();
                const cash = parseFloat(personalBalances.cash || 0);
                const account = parseFloat(personalBalances.account || 0);
                try {
                    await pushBalanceUpdate('user_balance', { cash, account });
                    showError("✅ Wallet Balances Synced to Cloud!");
                    await fetchData();
                } catch(err) { showError("Failed to sync balances."); }
            };

            const handleAddBizExp = async (e) => {
                e.preventDefault();
                const amountNum = parseFloat(bizExpForm.amount);
                if (!amountNum || !bizExpForm.description) return showError("Please fill details.");

                const baseRate = EXCHANGE_RATES[viewCurrency];
                const amountInBaseINR = amountNum / baseRate;
                const timestamp = new Date(bizExpForm.date).getTime() || Date.now();

                try {
                    await supabase.from('expenses').insert([{
                        type: 'biz_exp',
                        amount: amountInBaseINR,
                        description: bizExpForm.description,
                        paid_by: loggedInUser.username,
                        timestamp: timestamp
                    }]);

                    // DEDUCTION LOGIC FOR BUSINESS EXPENSE
                    const updatedBizBalances = { ...bizBalances };
                    if (bizExpForm.source === 'cash') {
                        updatedBizBalances.cash = parseFloat((updatedBizBalances.cash - amountInBaseINR).toFixed(2));
                    } else {
                        updatedBizBalances.account = parseFloat((updatedBizBalances.account - amountInBaseINR).toFixed(2));
                    }
                    setBizBalances(updatedBizBalances);
                    await pushBalanceUpdate('biz_bal', updatedBizBalances);

                    setBizExpForm({ description: '', amount: '', date: new Date().toISOString().split('T')[0], source: 'account' });
                    showError(`✅ Business Expense Saved & Deducted from ${bizExpForm.source}!`);
                    await fetchData(); 
                } catch (err) { showError("Failed to add business record."); }
            };

            const handleSaveBizBalances = async (e) => {
                e.preventDefault();
                const cash = parseFloat(bizBalances.cash || 0);
                const account = parseFloat(bizBalances.account || 0);
                try {
                    await pushBalanceUpdate('biz_bal', { cash, account });
                    showError("✅ Business Balances Synced to Cloud!");
                    await fetchData();
                } catch(err) { showError("Failed to sync biz balances."); }
            };

            const handleAddBizSale = async (e) => {
                e.preventDefault();
                const qty = parseFloat(bizSaleForm.qty || 1);
                const buy = parseFloat(bizSaleForm.buy || 0);
                const exp = parseFloat(bizSaleForm.exp || 0);
                const sell = parseFloat(bizSaleForm.sell || 0);
                if (!bizSaleForm.name || !sell) return showError("Product Name and Sell Price required.");

                const baseRate = EXCHANGE_RATES[viewCurrency];
                const totalRev = (qty * sell) / baseRate;
                const totalCost = (qty * (buy + exp)) / baseRate;
                const payload = { name: bizSaleForm.name, qty, buy, exp, sell, totalRev, totalCost };

                try {
                    await supabase.from('expenses').insert([{ type: 'biz_sale', amount: totalRev, description: JSON.stringify(payload), paid_by: loggedInUser.username, timestamp: new Date(bizSaleForm.date).getTime() }]);
                    
                    // Add profit to business balance automatically upon sale
                    const netProfit = totalRev - totalCost;
                    const updatedBizBalances = { ...bizBalances, account: parseFloat((bizBalances.account + netProfit).toFixed(2)) };
                    setBizBalances(updatedBizBalances);
                    await pushBalanceUpdate('biz_bal', updatedBizBalances);

                    setBizSaleForm({ ...bizSaleForm, name: '', buy: '', sell: '' });
                    showError(`✅ Sale Saved! Added profit to A/C.`);
                    await fetchData(); 
                } catch (err) { showError("Failed to add sale record."); }
            };

            const handleAddKhata = async (e) => {
                e.preventDefault();
                const amountInBaseINR = parseFloat(khataForm.amount) / EXCHANGE_RATES[viewCurrency];
                await supabase.from('expenses').insert([{ type: khataForm.mode === 'take' ? 'khata_take' : 'khata_give', amount: amountInBaseINR, description: khataForm.name, paid_by: loggedInUser.username, timestamp: new Date(khataForm.date).getTime() }]);
                setKhataForm({ ...khataForm, name: '', amount: '' });
                showError("✅ Khata Entry Saved!");
                await fetchData(); 
            };

            const handleDeleteExpense = async (id) => {
                await supabase.from('expenses').delete().eq('id', id);
                await fetchData(); 
            };

            // Role Based Visibility
            const visibleExpenses = useMemo(() => {
                if (activeTab === 'group') return expenses.filter(e => e.type === 'group');
                if (activeTab === 'personal') return expenses.filter(e => e.type === 'personal' && e.paid_by === loggedInUser?.username);
                if (activeTab === 'all_personal') return expenses.filter(e => e.type === 'personal');
                return [];
            }, [expenses, activeTab, loggedInUser]);

            const groupTotal = useMemo(() => expenses.filter(e => e.type === 'group').reduce((sum, e) => sum + e.amount, 0), [expenses]);
            const perPersonShare = useMemo(() => appUsers.length > 0 ? groupTotal / appUsers.length : 0, [groupTotal, appUsers]);

            const groupExpensesByPerson = useMemo(() => {
                const summary = {};
                appUsers.forEach(u => summary[u.username] = 0);
                expenses.filter(e => e.type === 'group').forEach(exp => {
                    if (summary[exp.paid_by] !== undefined) summary[exp.paid_by] += exp.amount;
                });
                return summary;
            }, [expenses, appUsers]);

            const settlements = useMemo(() => {
                if (appUsers.length === 0 || groupTotal === 0) return [];
                const debtors = [], creditors = [];

                appUsers.forEach(u => {
                    const balance = (groupExpensesByPerson[u.username] || 0) - perPersonShare;
                    if (balance < -0.01) debtors.push({ name: u.username, amount: Math.abs(balance) });
                    else if (balance > 0.01) creditors.push({ name: u.username, amount: balance });
                });
                debtors.sort((a, b) => b.amount - a.amount);
                creditors.sort((a, b) => b.amount - a.amount);

                const transactions = [];
                let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const debtor = debtors[i], creditor = creditors[j];
                    const amountToSettle = Math.min(debtor.amount, creditor.amount);
                    transactions.push({ from: debtor.name, to: creditor.name, amount: amountToSettle });
                    debtor.amount -= amountToSettle;
                    creditor.amount -= amountToSettle;
                    if (debtor.amount < 0.01) i++;
                    if (creditor.amount < 0.01) j++;
                }
                return transactions;
            }, [groupExpensesByPerson, groupTotal, appUsers, perPersonShare]);

            const isKhataEligible = ['amit', 'shivam'].includes(loggedInUser?.username?.toLowerCase());

            const renderIcon = (name, className) => {
                const icons = {
                    users: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                    wallet: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
                    shield: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                    camera: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
                    book: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
                    briefcase: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
                    trash: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
                    logOut: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
                    arrow: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                };
                return icons[name] || null;
            };

            const NavItem = ({ id, icon, label, isMobile }) => {
                const isActive = activeTab === id;
                if (isMobile) {
                    return (
                        <button onClick={() => setActiveTab(id)} className={`flex flex-col items-center justify-center w-full space-y-1 ${isActive ? t.text : 'text-slate-500 hover:text-slate-300'}`}>
                            {renderIcon(icon, `w-6 h-6 ${isActive ? 'scale-110' : ''} transition-transform`)}
                            <span className="text-[10px] font-medium">{label}</span>
                        </button>
                    );
                }
                return (
                    <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${isActive ? `${t.main} text-white shadow-lg` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                        {renderIcon(icon, "w-5 h-5")}
                        <span className="font-medium text-sm">{label}</span>
                    </button>
                );
            };

            // Loading state prevents flashing setup screen before DB confirms users exist
            if (isLoading) {
                return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-bold text-lg">Loading UniMoney...</div>;
            }

            // Setup Screen Component
            if (!loggedInUser) {
                const hasAdmin = appUsers.some(u => u.role === 'admin');
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="w-full max-w-sm bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700">
                            <h1 className="text-2xl font-bold text-center text-white mb-2">UniMoney</h1>
                            <p className="text-slate-400 text-center text-sm mb-8">{hasAdmin ? "Workspace Login" : "Initialize Master Admin"}</p>
                            {authError && <div className="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl text-sm mb-6 text-center leading-snug">{authError}</div>}
                            <form onSubmit={hasAdmin ? handleLogin : handleSetupAdmin} className="space-y-4">
                                <input type="text" required value={hasAdmin ? loginForm.username : setupForm.username} onChange={e => hasAdmin ? setLoginForm({...loginForm, username: e.target.value}) : setSetupForm({...setupForm, username: e.target.value})} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="Username" />
                                <input type="password" required value={hasAdmin ? loginForm.password : setupForm.password} onChange={e => hasAdmin ? setLoginForm({...loginForm, password: e.target.value}) : setSetupForm({...setupForm, password: e.target.value})} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="Password" />
                                <button type="submit" className={`w-full ${t.main} text-white py-3 rounded-xl font-bold transition-colors mt-6`}>{hasAdmin ? "Secure Login" : "Initialize Admin (Amit)"}</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-900 text-slate-200 overflow-hidden font-sans">
                    {/* Desktop Sidebar */}
                    <aside className="hidden md:flex flex-col w-64 bg-[#0b1121] border-r border-slate-800 shrink-0">
                        <div className="p-6 border-b border-slate-800">
                            <h1 className="text-2xl font-black text-white tracking-tight">UniMoney<span className={t.text}>.</span></h1>
                            <p className="text-xs text-slate-500 mt-1 capitalize font-medium">{loggedInUser.username} • {loggedInUser.role}</p>
                        </div>
                        <div className="flex-1 p-4 space-y-2 overflow-y-auto">
                            <NavItem id="group" icon="users" label="Shared Trip" />
                            <NavItem id="personal" icon="wallet" label="My Personal" />
                            {isKhataEligible && <NavItem id="khata" icon="book" label="My Khata" />}
                            {loggedInUser.role === 'admin' && (
                                <>
                                    <div className="my-4 border-t border-slate-800/50 pt-4">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 px-2">Workspace Controls</p>
                                        <NavItem id="all_personal" icon="users" label="All User Accounts" />
                                        <NavItem id="business" icon="briefcase" label="My Business" />
                                        <NavItem id="admin" icon="shield" label="Manage Access" />
                                    </div>
                                </>
                            )}
                            <NavItem id="hub" icon="camera" label="Trip Hub" />
                        </div>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={handleLogout} className="w-full flex justify-center gap-2 py-3 rounded-xl text-slate-400 hover:text-red-400 hover:bg-red-500/10 text-sm font-medium transition-colors">
                                {renderIcon('logOut', 'w-4 h-4')} Logout
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 h-full overflow-y-auto bg-slate-900 pb-24 md:pb-0">
                        <div className="p-4 md:p-8 max-w-5xl mx-auto space-y-6 animate-tab">
                            {uiError && <div className="bg-slate-800 border border-slate-600 px-4 py-3 rounded-xl font-medium shadow-lg mb-6 text-white text-sm">{uiError}</div>}

                            {/* SHARED TRIP */}
                            {activeTab === 'group' && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-5 border border-slate-700 shadow-xl relative overflow-hidden">
                                            <h3 className="text-slate-400 text-[10px] font-bold uppercase mb-1">Total Group Spend</h3>
                                            <p className="text-2xl font-black text-white">{formatAmount(groupTotal)}</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-blue-900/40 to-slate-900 rounded-2xl p-5 border border-blue-500/30 shadow-xl relative overflow-hidden">
                                            <h3 className="text-blue-300 text-[10px] font-bold uppercase mb-1">Per Person Share</h3>
                                            <p className="text-2xl font-black text-white">{formatAmount(perPersonShare)}</p>
                                        </div>
                                    </div>

                                    {groupTotal > 0 && settlements.length > 0 && (
                                        <div className="bg-emerald-900/20 border border-emerald-500/30 rounded-2xl overflow-hidden shadow-xl">
                                            <div className="bg-emerald-900/40 px-4 py-3 border-b border-emerald-500/20">
                                                <h3 className="text-xs font-bold text-emerald-400 uppercase">Who Owes Who</h3>
                                            </div>
                                            <div className="p-4 space-y-3">
                                                {settlements.map((s, idx) => (
                                                    <div key={idx} className="flex items-center justify-between text-sm bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-rose-400">{s.from}</span>
                                                            {renderIcon('arrow', 'w-4 h-4 text-slate-500')}
                                                            <span className="font-bold text-emerald-400">{s.to}</span>
                                                        </div>
                                                        <span className="font-black text-white">{formatAmount(s.amount)}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 shadow-xl">
                                        <h2 className="font-bold text-white mb-4">Add Group Expense</h2>
                                        <form onSubmit={handleAddExpense} className="space-y-4">
                                            {loggedInUser.role === 'admin' ? (
                                                <select value={newExpense.paidBy} onChange={e => setNewExpense({...newExpense, paidBy: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white appearance-none" required>
                                                    <option value="">Who paid?</option>
                                                    {appUsers.map(u => <option key={u.id} value={u.username}>{u.username}</option>)}
                                                </select>
                                            ) : (
                                                <div className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-400 flex items-center gap-2">
                                                    {renderIcon('shield', 'w-4 h-4 text-blue-500')} {loggedInUser.username} <span className="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded ml-auto">Auto</span>
                                                </div>
                                            )}
                                            <input type="text" value={newExpense.description} onChange={e => setNewExpense({...newExpense, description: e.target.value})} placeholder="What was it for?" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white" required />
                                            <input type="number" step="0.01" value={newExpense.amount} onChange={e => setNewExpense({...newExpense, amount: e.target.value})} placeholder="Amount" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white" required />
                                            <button type="submit" className={`w-full py-3 rounded-xl font-bold text-white ${t.main}`}>Save Expense</button>
                                        </form>
                                    </div>
                                    <div className="bg-slate-800/30 border border-slate-700 rounded-2xl overflow-hidden shadow-xl">
                                        <div className="px-5 py-4 border-b border-slate-700 bg-slate-800/80"><h2 className="font-bold text-white">Group Ledger</h2></div>
                                        <ul className="divide-y divide-slate-700/50">
                                            {visibleExpenses.map(expense => (
                                                <li key={expense.id} className="p-4 flex justify-between items-center">
                                                    <div>
                                                        <p className="font-bold text-white text-md">{expense.description}</p>
                                                        <p className="text-xs text-slate-400 mt-1">{expense.paid_by} • {new Date(expense.timestamp).toLocaleDateString()}</p>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <span className="font-black text-white text-lg">{formatAmount(expense.amount)}</span>
                                                        {loggedInUser.role === 'admin' && <button onClick={() => handleDeleteExpense(expense.id)} className="text-slate-600 hover:text-red-400 p-2">{renderIcon('trash', 'w-4 h-4')}</button>}
                                                    </div>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            )}

                            {/* MY PERSONAL (WITH DEDUCTION LOGIC) */}
                            {activeTab === 'personal' && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-indigo-900/40 p-5 rounded-2xl border border-indigo-500/30 text-center">
                                            <p className="text-[10px] text-indigo-300 font-bold uppercase mb-1">Cash Balance</p>
                                            <p className="text-2xl font-black text-white">{formatAmount(personalBalances.cash)}</p>
                                        </div>
                                        <div className="bg-indigo-900/40 p-5 rounded-2xl border border-indigo-500/30 text-center">
                                            <p className="text-[10px] text-indigo-300 font-bold uppercase mb-1">A/C Balance</p>
                                            <p className="text-2xl font-black text-white">{formatAmount(personalBalances.account)}</p>
                                        </div>
                                    </div>

                                    {/* Edit Balances Accordion */}
                                    <details className="group bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
                                        <summary className="p-4 font-bold text-slate-300 cursor-pointer flex justify-between">Set Manual Balances <span className="text-xs font-normal opacity-50">(Tap to expand)</span></summary>
                                        <div className="p-4 border-t border-slate-700">
                                            <form onSubmit={handleSavePersonalBalances} className="flex gap-4">
                                                <input type="number" step="0.01" value={personalBalances.cash} onChange={e => setPersonalBalances({...personalBalances, cash: parseFloat(e.target.value)||0})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white" placeholder="Cash" />
                                                <input type="number" step="0.01" value={personalBalances.account} onChange={e => setPersonalBalances({...personalBalances, account: parseFloat(e.target.value)||0})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white" placeholder="Account" />
                                                <button type="submit" className="bg-indigo-600 text-white px-4 rounded-lg text-sm font-bold">Sync</button>
                                            </form>
                                        </div>
                                    </details>

                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 shadow-xl">
                                        <h2 className="font-bold text-white mb-4">Add Personal Expense</h2>
                                        <form onSubmit={handleAddExpense} className="space-y-4">
                                            <input type="text" value={newExpense.description} onChange={e => setNewExpense({...newExpense, description: e.target.value})} placeholder="What was it for?" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white" required />
                                            <div className="flex gap-4">
                                                <input type="number" step="0.01" value={newExpense.amount} onChange={e => setNewExpense({...newExpense, amount: e.target.value})} placeholder="Amount" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white flex-[2]" required />
                                                <select value={newExpense.source} onChange={e => setNewExpense({...newExpense, source: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white flex-1">
                                                    <option value="account">A/C</option>
                                                    <option value="cash">Cash</option>
                                                </select>
                                            </div>
                                            <button type="submit" className="w-full py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500 shadow-lg">Save & Deduct Expense</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* MY BUSINESS (ADMIN ONLY WITH DEDUCTION LOGIC) */}
                            {activeTab === 'business' && loggedInUser.role === 'admin' && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-amber-900/40 p-5 rounded-2xl border border-amber-500/30 text-center">
                                            <p className="text-[10px] text-amber-300 font-bold uppercase mb-1">Biz Cash Balance</p>
                                            <p className="text-2xl font-black text-white">{formatAmount(bizBalances.cash)}</p>
                                        </div>
                                        <div className="bg-amber-900/40 p-5 rounded-2xl border border-amber-500/30 text-center">
                                            <p className="text-[10px] text-amber-300 font-bold uppercase mb-1">Biz A/C Balance</p>
                                            <p className="text-2xl font-black text-white">{formatAmount(bizBalances.account)}</p>
                                        </div>
                                    </div>

                                    <details className="group bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
                                        <summary className="p-4 font-bold text-slate-300 cursor-pointer flex justify-between">Set Manual Biz Balances <span className="text-xs font-normal opacity-50">(Tap to expand)</span></summary>
                                        <div className="p-4 border-t border-slate-700">
                                            <form onSubmit={handleSaveBizBalances} className="flex gap-4">
                                                <input type="number" step="0.01" value={bizBalances.cash} onChange={e => setBizBalances({...bizBalances, cash: parseFloat(e.target.value)||0})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white" placeholder="Cash" />
                                                <input type="number" step="0.01" value={bizBalances.account} onChange={e => setBizBalances({...bizBalances, account: parseFloat(e.target.value)||0})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white" placeholder="Account" />
                                                <button type="submit" className="bg-amber-600 text-white px-4 rounded-lg text-sm font-bold">Sync</button>
                                            </form>
                                        </div>
                                    </details>

                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-5 shadow-xl">
                                        <div className="flex gap-1 bg-slate-900 p-1 rounded-xl mb-4">
                                            <button onClick={() => setBizTab('sale')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${bizTab === 'sale' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>+ Log Sale</button>
                                            <button onClick={() => setBizTab('exp')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${bizTab === 'exp' ? 'bg-rose-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>+ Log Expense</button>
                                        </div>

                                        {bizTab === 'sale' && (
                                            <form onSubmit={handleAddBizSale} className="space-y-4">
                                                <div className="flex gap-3">
                                                    <div className="flex-[2]">
                                                        <label className="block text-[11px] font-bold text-slate-400 mb-1">Product Name</label>
                                                        <input type="text" value={bizSaleForm.name} onChange={e => setBizSaleForm({...bizSaleForm, name: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none text-white" required />
                                                    </div>
                                                    <div className="flex-1">
                                                        <label className="block text-[11px] font-bold text-slate-400 mb-1">Qty</label>
                                                        <input type="number" min="1" value={bizSaleForm.qty} onChange={e => setBizSaleForm({...bizSaleForm, qty: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none text-white" required />
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-3">
                                                    <div>
                                                        <label className="block text-[11px] font-bold text-rose-500 mb-1">Buy/pc</label>
                                                        <input type="number" step="0.01" value={bizSaleForm.buy} onChange={e => setBizSaleForm({...bizSaleForm, buy: e.target.value})} className="w-full bg-slate-900 border border-rose-500/30 rounded-lg px-2 py-2 text-sm focus:outline-none text-white" placeholder="0" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[11px] font-bold text-amber-500 mb-1">Exp/pc</label>
                                                        <input type="number" step="0.01" value={bizSaleForm.exp} onChange={e => setBizSaleForm({...bizSaleForm, exp: e.target.value})} className="w-full bg-slate-900 border border-amber-500/30 rounded-lg px-2 py-2 text-sm focus:outline-none text-white" placeholder="0" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[11px] font-bold text-emerald-500 mb-1">Sell/pc</label>
                                                        <input type="number" step="0.01" value={bizSaleForm.sell} onChange={e => setBizSaleForm({...bizSaleForm, sell: e.target.value})} className="w-full bg-slate-900 border border-emerald-500/30 rounded-lg px-2 py-2 text-sm focus:outline-none text-white" required placeholder="0" />
                                                    </div>
                                                </div>
                                                <button type="submit" className="w-full py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-600/20">Save Sale</button>
                                            </form>
                                        )}

                                        {bizTab === 'exp' && (
                                            <form onSubmit={handleAddBizExp} className="space-y-4">
                                                <input type="text" value={bizExpForm.description} onChange={e => setBizExpForm({...bizExpForm, description: e.target.value})} placeholder="Marketing, Software..." className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white" required />
                                                <div className="flex gap-4">
                                                    <input type="number" step="0.01" value={bizExpForm.amount} onChange={e => setBizExpForm({...bizExpForm, amount: e.target.value})} placeholder="Amount" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white flex-[2]" required />
                                                    <select value={bizExpForm.source} onChange={e => setBizExpForm({...bizExpForm, source: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none text-white flex-1">
                                                        <option value="account">A/C</option>
                                                        <option value="cash">Cash</option>
                                                    </select>
                                                </div>
                                                <button type="submit" className="w-full py-3 rounded-xl font-bold text-white bg-amber-600 hover:bg-amber-500 shadow-lg">Save & Deduct Biz Expense</button>
                                            </form>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* --- ADMIN ACCESS TAB --- */}
                            {activeTab === 'admin' && loggedInUser.role === 'admin' && (
                                <div className="space-y-6">
                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-6">
                                        <h2 className="text-lg font-bold text-white mb-4">Create User Credentials</h2>
                                        <form onSubmit={async (e) => {
                                            e.preventDefault();
                                            if (appUsers.some(u => u.username.toLowerCase() === newFriend.username.trim().toLowerCase())) return showError("Username already exists!");
                                            await supabase.from('app_users').insert([{ username: newFriend.username.trim(), password: newFriend.password, role: 'friend', created_at: Date.now() }]);
                                            setNewFriend({ username: '', password: '' });
                                            await fetchData();
                                        }} className="flex flex-col sm:flex-row gap-4">
                                            <input type="text" required value={newFriend.username} onChange={e => setNewFriend({...newFriend, username: e.target.value})} placeholder="Friend's Username" className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white" />
                                            <input type="text" required value={newFriend.password} onChange={e => setNewFriend({...newFriend, password: e.target.value})} placeholder="Create Password" className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white" />
                                            <button type="submit" className="bg-amber-600 hover:bg-amber-500 text-white px-6 py-3 rounded-xl font-bold transition-colors">Add User</button>
                                        </form>
                                    </div>
                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
                                        <div className="p-4 border-b border-slate-700 bg-slate-800/80"><h3 className="font-bold text-white">All Active Accounts</h3></div>
                                        <ul className="divide-y divide-slate-700">
                                            {appUsers.map(u => (
                                                <li key={u.id} className="p-4 flex justify-between items-center hover:bg-slate-800">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-bold text-white overflow-hidden border border-slate-600">
                                                            {u.avatar ? <img src={u.avatar} className="w-full h-full object-cover" /> : u.username.substring(0,2).toUpperCase()}
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-white flex items-center gap-2">{u.username} {u.role === 'admin' && <span className="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20 uppercase">Admin</span>}</p>
                                                            <p className="text-xs text-slate-500 mt-1 font-mono">PWD: {u.role === 'admin' ? '********' : u.password}</p>
                                                        </div>
                                                    </div>
                                                    {u.role !== 'admin' && <button onClick={async () => { await supabase.from('app_users').delete().eq('id', u.id); await fetchData(); }} className="p-2 text-slate-500 hover:text-red-400 bg-slate-900 rounded-lg border border-slate-700 hover:border-red-500/50">{renderIcon('trash', 'w-5 h-5')}</button>}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            )}

                            {/* --- HUB & KHATA MAINTAINED IN TAB RENDERING LOGIC AS BEFORE --- */}
                            {activeTab === 'hub' && (
                                <div className="space-y-6">
                                    <div className="bg-gradient-to-br from-indigo-900/50 to-blue-900/50 border border-indigo-500/30 rounded-2xl p-8 text-center relative overflow-hidden">
                                        <div className="absolute -right-10 -bottom-10 text-white/5 w-64 h-64">{renderIcon('camera', 'w-full h-full')}</div>
                                        <h2 className="text-3xl font-black text-white mb-2 relative z-10">Trip Photo Gallery</h2>
                                        <p className="text-indigo-200 mb-8 max-w-lg mx-auto relative z-10">Access our 5TB shared Google Drive! You can instantly upload your photos and videos, or download the full trip collection.</p>
                                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4 relative z-10">
                                            <a href={GDRIVE_LINK} target="_blank" rel="noreferrer" className="w-full sm:w-auto flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-bold text-sm shadow-lg shadow-indigo-600/20">{renderIcon('camera', 'w-5 h-5')} Upload Media</a>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                        </div>
                    </main>

                    {/* Bottom Mobile Navigation (Native App Feel) */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 glass-panel z-50 flex justify-around items-center pt-3 pb-6 px-2 border-t border-slate-800">
                        <NavItem isMobile id="group" icon="users" label="Group" />
                        <NavItem isMobile id="personal" icon="wallet" label="Wallet" />
                        {isKhataEligible && <NavItem isMobile id="khata" icon="book" label="Khata" />}
                        {loggedInUser.role === 'admin' && <NavItem isMobile id="business" icon="briefcase" label="Biz" />}
                        <button onClick={handleLogout} className="flex flex-col items-center justify-center w-full space-y-1 text-slate-500 hover:text-red-400">
                            {renderIcon('logOut', "w-6 h-6")}
                            <span className="text-[10px] font-medium">Exit</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
