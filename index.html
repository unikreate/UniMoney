<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>UniMoney Expense Manager</title>
    
    <!-- CDNs for React, Tailwind, Lucide Icons, and Supabase -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        /* Custom scrollbar and styling for dark native app feel */
        body { background-color: #0f172a; margin: 0; overscroll-behavior-y: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // =========================================================================
        // 🛑 IMPORTANT: PASTE YOUR SUPABASE DETAILS HERE BEFORE SAVING TO GITHUB
        // =========================================================================
        const SUPABASE_URL = "https://pdurzxmsjjwlhwaucakl.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkdXJ6eG1zamp3bGh3YXVjYWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTA3ODEsImV4cCI6MjA5NTg4Njc4MX0.e4VAMmx8J7AX3Cx5N5ZRq5-RnY5b4GURzYylLSmXfSY";
        // =========================================================================
        
        // Gemini API Configuration
        const apiKey = ""; 
        
        // Hardcoded Google Drive 5TB Storage Link
        const GDRIVE_LINK = "https://drive.google.com/drive/folders/1mLGkLtoEXu9h34UHdBrP6d39UdJfHVIz?usp=drive_link";

        const { useState, useEffect, useMemo } = React;

        // Exchange rates (Base INR)
        const EXCHANGE_RATES = { INR: 1, USD: 0.012, EUR: 0.011, GBP: 0.0095 };
        const CURRENCY_SYMBOLS = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };

        // Helper for API calls with Exponential Backoff
        const fetchWithRetry = async (url, options) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        function App() {
            // Check if user has pasted keys
            const keysAreMissing = SUPABASE_URL.includes("YOUR_SUPABASE_URL_HERE") || SUPABASE_ANON_KEY.includes("YOUR_SUPABASE_ANON_KEY_HERE");

            const [supabase, setSupabase] = useState(null);
            const [appUsers, setAppUsers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [loggedInUser, setLoggedInUser] = useState(null);
            
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [setupForm, setSetupForm] = useState({ username: '', password: '' });
            const [authError, setAuthError] = useState('');
            
            const [activeTab, setActiveTab] = useState('group');
            const [newExpense, setNewExpense] = useState({ amount: '', description: '', paidBy: '' });
            const [newFriend, setNewFriend] = useState({ username: '', password: '' });
            const [uiError, setUiError] = useState('');
            const [viewCurrency, setViewCurrency] = useState('INR');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // AI States
            const [isAnalyzingReceipt, setIsAnalyzingReceipt] = useState(false);
            const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);
            const [aiInsights, setAiInsights] = useState("");

            // 1. Initialize Supabase directly from hardcoded keys
            useEffect(() => {
                if (!keysAreMissing) {
                    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    setSupabase(sbClient);
                }
            }, []);

            // 2. Data Fetching Logic
            const fetchData = async () => {
                if (!supabase) return;

                const { data: usersData, error: usersErr } = await supabase.from('app_users').select('*');
                if (!usersErr && usersData) {
                    setAppUsers(usersData);
                    
                    const savedUserId = localStorage.getItem('unimoney_user_id');
                    if (savedUserId) {
                        const foundUser = usersData.find(u => String(u.id) === String(savedUserId));
                        if (foundUser) setLoggedInUser(foundUser);
                    }
                }

                const { data: expData, error: expErr } = await supabase.from('expenses').select('*').order('timestamp', { ascending: false });
                if (!expErr && expData) setExpenses(expData);
            };

            useEffect(() => {
                fetchData();
            }, [supabase]);

            // --- Missing Keys Screen ---
            if (keysAreMissing) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-red-500/10 border border-red-500 text-red-500 p-6 rounded-2xl max-w-md w-full">
                            <h2 className="text-xl font-bold mb-2">Supabase Keys Missing!</h2>
                            <p className="text-sm mb-4">You need to edit your `index.html` file in GitHub and paste your SUPABASE_URL and SUPABASE_ANON_KEY on lines 28 and 29.</p>
                        </div>
                    </div>
                );
            }

            // --- Auth Actions ---
            const handleSetupAdmin = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    const { data, error } = await supabase.from('app_users').insert([{
                        username: setupForm.username.trim(),
                        password: setupForm.password,
                        role: 'admin',
                        created_at: Date.now()
                    }]).select();
                    if (error) throw error;
                    setLoggedInUser(data[0]);
                    localStorage.setItem('unimoney_user_id', data[0].id);
                    await fetchData();
                } catch (err) {
                    setAuthError(err.message || "Failed to setup Admin.");
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setAuthError('');
                const foundUser = appUsers.find(
                    u => u.username.toLowerCase() === loginForm.username.trim().toLowerCase() && u.password === loginForm.password
                );
                if (foundUser) {
                    setLoggedInUser(foundUser);
                    localStorage.setItem('unimoney_user_id', foundUser.id);
                    setLoginForm({ username: '', password: '' });
                    setActiveTab('group');
                } else {
                    setAuthError("Invalid username or password.");
                }
            };

            const handleLogout = () => {
                setLoggedInUser(null);
                localStorage.removeItem('unimoney_user_id');
                setActiveTab('group');
                setIsMobileMenuOpen(false);
            };

            // --- Profile Photo Upload ---
            const handleAvatarUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64String = reader.result;
                    const { error } = await supabase.from('app_users').update({ avatar: base64String }).eq('id', loggedInUser.id);
                    if(error) {
                        showError("Error: Please run the SQL command to add the 'avatar' column first!");
                    } else {
                        await fetchData();
                    }
                };
                reader.readAsDataURL(file);
            };

            // --- Gemini AI Actions ---
            const handleReceiptUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setIsAnalyzingReceipt(true);
                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64Data = reader.result.split(',')[1];
                        const mimeType = file.type;
                        const prompt = "Analyze this receipt. Extract the total amount and a short description (like 'Dinner at Restaurant' or 'Gas Station'). Return ONLY valid JSON with 'amount' (number) and 'description' (string) fields.";
                        
                        const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    role: "user",
                                    parts: [
                                        { text: prompt },
                                        { inlineData: { mimeType, data: base64Data } }
                                    ]
                                }],
                                generationConfig: {
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            amount: { type: "NUMBER" },
                                            description: { type: "STRING" }
                                        }
                                    }
                                }
                            })
                        });

                        const textData = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (textData) {
                            const parsed = JSON.parse(textData);
                            
                            // Convert from base currency if we are in another view
                            const rate = EXCHANGE_RATES[viewCurrency];
                            const adjustedAmount = parsed.amount ? (parsed.amount * rate).toFixed(2) : prev.amount;

                            setNewExpense(prev => ({
                                ...prev,
                                amount: adjustedAmount,
                                description: parsed.description || prev.description
                            }));
                            showError("✨ Receipt analyzed successfully! Verify details below.");
                        }
                        setIsAnalyzingReceipt(false);
                    };
                    reader.readAsDataURL(file);
                } catch (err) {
                    showError("Failed to analyze receipt. Ensure it's a clear image.");
                    setIsAnalyzingReceipt(false);
                }
            };

            const handleGenerateInsights = async () => {
                if (expenses.length === 0) {
                    showError("Need some expenses to analyze first!");
                    return;
                }
                setIsGeneratingInsights(true);
                try {
                    const expenseSummary = expenses.map(e => `${e.paidBy || e.paid_by} spent ${e.amount} on ${e.description} (${e.type})`).join('\n');
                    const prompt = `You are a fun, witty financial advisor. Here is a list of travel expenses for our group trip:\n${expenseSummary}\n\nProvide a short, entertaining summary (max 3 short paragraphs) of our spending habits. Point out who spent the most, what our weirdest or biggest expenses are, and give us a funny financial rating at the end. Use emojis!`;
                    
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) setAiInsights(text);
                } catch (err) {
                    showError("Failed to generate AI insights.");
                } finally {
                    setIsGeneratingInsights(false);
                }
            };

            // --- Trip Hub Actions ---
            const handleExportCSV = () => {
                let csv = "Date,Type,Description,Paid By,Amount\n";
                expenses.filter(e => e.type === 'group' || e.type === 'personal').forEach(e => {
                    csv += `"${new Date(e.timestamp).toLocaleString()}","${e.type}","${e.description}","${e.paidBy || e.paid_by}","${e.amount}"\n`;
                });
                
                csv += "\nSETTLEMENTS (Who Owes Who)\n";
                settlements.forEach(s => {
                    csv += `"${s.from}","owes","${s.to}","${s.amount}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', 'UniMoney_Trip_Report.csv');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            // --- Helper: Format Currency ---
            const formatAmount = (baseAmount) => {
                const rate = EXCHANGE_RATES[viewCurrency];
                const converted = baseAmount * rate;
                return `${CURRENCY_SYMBOLS[viewCurrency]}${converted.toFixed(2)}`;
            };

            const showError = (msg) => {
                setUiError(msg);
                setTimeout(() => setUiError(''), 4000);
            };

            // --- Data Actions ---
            const handleAddExpense = async (e) => {
                e.preventDefault();
                const amountNum = parseFloat(newExpense.amount);
                if (!amountNum || !newExpense.description) {
                    showError("Please fill amount and description.");
                    return;
                }

                const baseRate = EXCHANGE_RATES[viewCurrency];
                const amountInBaseINR = amountNum / baseRate;

                let payer = '';
                if (activeTab === 'group') {
                    if (loggedInUser.role === 'admin') {
                        if (!newExpense.paidBy) {
                            showError("Please select who paid.");
                            return;
                        }
                        payer = newExpense.paidBy;
                    } else {
                        payer = loggedInUser.username;
                    }
                } else {
                    payer = loggedInUser.username;
                }

                try {
                    const { error } = await supabase.from('expenses').insert([{
                        type: activeTab === 'group' ? 'group' : 'personal',
                        amount: amountInBaseINR,
                        description: newExpense.description,
                        paid_by: payer,
                        timestamp: Date.now()
                    }]);
                    if (error) throw error;
                    setNewExpense({ amount: '', description: '', paidBy: '' });
                    await fetchData(); 
                } catch (err) {
                    showError(err.message || "Failed to add expense.");
                }
            };

            const handleDeleteExpense = async (expenseId) => {
                if (loggedInUser.role !== 'admin') return;
                await supabase.from('expenses').delete().eq('id', expenseId);
                await fetchData(); 
            };

            const handleCreateFriend = async (e) => {
                e.preventDefault();
                if (loggedInUser.role !== 'admin') return;
                if (appUsers.some(u => u.username.toLowerCase() === newFriend.username.trim().toLowerCase())) {
                    showError("Username already exists!");
                    return;
                }
                await supabase.from('app_users').insert([{
                    username: newFriend.username.trim(),
                    password: newFriend.password,
                    role: 'friend',
                    created_at: Date.now()
                }]);
                setNewFriend({ username: '', password: '' });
                await fetchData(); 
            };

            const handleDeleteUser = async (userId) => {
                if (loggedInUser.role !== 'admin') return;
                await supabase.from('app_users').delete().eq('id', userId);
                await fetchData(); 
            };

            // --- Calculations & Settlements ---
            const visibleExpenses = useMemo(() => {
                if (activeTab === 'group') return expenses.filter(e => e.type === 'group');
                if (activeTab === 'personal') {
                    if (loggedInUser?.role === 'admin') return expenses.filter(e => e.type === 'personal');
                    return expenses.filter(e => e.type === 'personal' && (e.paidBy === loggedInUser?.username || e.paid_by === loggedInUser?.username));
                }
                return [];
            }, [expenses, activeTab, loggedInUser]);

            const groupTotal = useMemo(() => expenses.filter(e => e.type === 'group').reduce((sum, e) => sum + e.amount, 0), [expenses]);

            const groupExpensesByPerson = useMemo(() => {
                const summary = {};
                appUsers.forEach(u => summary[u.username] = 0);
                expenses.filter(e => e.type === 'group').forEach(exp => {
                    const payerName = exp.paidBy || exp.paid_by;
                    if (summary[payerName] !== undefined) {
                        summary[payerName] += exp.amount;
                    }
                });
                return summary;
            }, [expenses, appUsers]);

            const settlements = useMemo(() => {
                if (appUsers.length === 0 || groupTotal === 0) return [];
                const perPersonShare = groupTotal / appUsers.length;
                
                const debtors = [];
                const creditors = [];

                appUsers.forEach(u => {
                    const paid = groupExpensesByPerson[u.username] || 0;
                    const balance = paid - perPersonShare;
                    if (balance < -0.01) debtors.push({ name: u.username, amount: Math.abs(balance) });
                    else if (balance > 0.01) creditors.push({ name: u.username, amount: balance });
                });

                debtors.sort((a, b) => b.amount - a.amount);
                creditors.sort((a, b) => b.amount - a.amount);

                const transactions = [];
                let i = 0, j = 0;

                while (i < debtors.length && j < creditors.length) {
                    const debtor = debtors[i];
                    const creditor = creditors[j];
                    const amountToSettle = Math.min(debtor.amount, creditor.amount);

                    transactions.push({ from: debtor.name, to: creditor.name, amount: amountToSettle });
                    debtor.amount -= amountToSettle;
                    creditor.amount -= amountToSettle;

                    if (debtor.amount < 0.01) i++;
                    if (creditor.amount < 0.01) j++;
                }
                return transactions;
            }, [groupExpensesByPerson, groupTotal, appUsers]);

            // --- Auth Screens ---
            if (!supabase) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white">Loading Cloud Services...</div>;

            if (!loggedInUser) {
                const hasAdmin = appUsers.some(u => u.role === 'admin');
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="w-full max-w-sm">
                            <div className="bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700">
                                <div className="w-16 h-16 bg-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-400">
                                    {hasAdmin ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                    )}
                                </div>
                                <h1 className="text-2xl font-bold text-center text-white mb-2">UniMoney</h1>
                                <p className="text-slate-400 text-center text-sm mb-8">
                                    {hasAdmin ? "Welcome back to your workspace" : "Create Master Admin to initialize"}
                                </p>
                                
                                {authError && (
                                    <div className="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl text-sm mb-6 text-center">
                                        {authError}
                                    </div>
                                )}

                                <form onSubmit={hasAdmin ? handleLogin : handleSetupAdmin} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                                        <input type="text" required value={hasAdmin ? loginForm.username : setupForm.username} onChange={e => hasAdmin ? setLoginForm({...loginForm, username: e.target.value}) : setSetupForm({...setupForm, username: e.target.value})} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Enter username" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                                        <input type="password" required value={hasAdmin ? loginForm.password : setupForm.password} onChange={e => hasAdmin ? setLoginForm({...loginForm, password: e.target.value}) : setSetupForm({...setupForm, password: e.target.value})} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="••••••••" />
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition-colors mt-6 shadow-lg shadow-blue-500/30">
                                        {hasAdmin ? "Secure Login" : "Initialize Admin"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Icons rendering function ---
            const renderIcon = (name, className) => {
                const icons = {
                    users: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                    wallet: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
                    shield: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                    plus: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>,
                    trash: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
                    menu: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
                    close: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
                    arrow: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
                    camera: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
                    download: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
                    upload: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
                    sparkles: <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
                };
                return icons[name] || null;
            };

            const NavItem = ({ id, icon, label }) => (
                <button 
                    onClick={() => { setActiveTab(id); setIsMobileMenuOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${
                        activeTab === id 
                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' 
                        : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                    }`}
                >
                    {renderIcon(icon, "w-5 h-5")}
                    <span className="font-medium text-sm">{label}</span>
                </button>
            );

            return (
                <div className="flex h-screen bg-slate-900 text-slate-200 overflow-hidden font-sans">
                    
                    {/* Mobile Header */}
                    <div className="md:hidden fixed top-0 left-0 right-0 h-16 glass-panel z-40 flex justify-between items-center px-4">
                        <div className="flex items-center gap-2 font-bold text-white">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                {renderIcon('wallet', "w-4 h-4")}
                            </div>
                            UniMoney
                        </div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 text-slate-300">
                            {isMobileMenuOpen ? renderIcon('close', 'w-6 h-6') : renderIcon('menu', 'w-6 h-6')}
                        </button>
                    </div>

                    {/* Sidebar */}
                    <aside className={`fixed md:static inset-y-0 left-0 z-30 w-72 bg-[#0b1121] border-r border-slate-800 flex flex-col transition-transform duration-300 ease-in-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        
                        {/* Profile Section */}
                        <div className="p-6 pt-20 md:pt-6 border-b border-slate-800">
                            <div className="flex items-center gap-4 bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                <div className="relative">
                                    <div className="w-12 h-12 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-full flex items-center justify-center text-lg font-bold text-white shadow-lg overflow-hidden border-2 border-transparent">
                                        {loggedInUser.avatar ? (
                                            <img src={loggedInUser.avatar} className="w-full h-full object-cover" alt="Profile" />
                                        ) : (
                                            loggedInUser.username.substring(0,2).toUpperCase()
                                        )}
                                    </div>
                                    <label className="absolute -bottom-1 -right-1 bg-slate-700 hover:bg-indigo-500 border border-slate-600 hover:border-indigo-400 rounded-full p-1.5 cursor-pointer transition-all shadow-lg z-10" title="Upload Profile Photo">
                                        {renderIcon('camera', 'w-3 h-3 text-white')}
                                        <input type="file" accept="image/*" className="hidden" onChange={handleAvatarUpload} />
                                    </label>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs text-slate-400 font-semibold uppercase tracking-wider">Profile</p>
                                    <p className="font-bold text-white truncate text-lg">{loggedInUser.username}</p>
                                </div>
                                {loggedInUser.role === 'admin' && (
                                    <span className="bg-amber-500/10 text-amber-400 text-[10px] font-bold px-2 py-1 rounded border border-amber-500/20">ADMIN</span>
                                )}
                            </div>
                        </div>

                        {/* Navigation */}
                        <div className="flex-1 p-4 space-y-2 overflow-y-auto no-scrollbar">
                            <NavItem id="group" icon="users" label="Shared Trip" />
                            <NavItem id="personal" icon="wallet" label={loggedInUser.role === 'admin' ? "Everyone's Personal" : "My Personal"} />
                            <NavItem id="hub" icon="camera" label="Trip Hub & Gallery" />
                            {loggedInUser.role === 'admin' && (
                                <NavItem id="admin" icon="shield" label="Manage Access" />
                            )}
                        </div>

                        {/* Bottom Actions */}
                        <div className="p-4 border-t border-slate-800 space-y-4">
                            <div className="space-y-1.5">
                                <label className="text-xs font-semibold text-slate-500 uppercase px-2">Display Currency</label>
                                <select 
                                    value={viewCurrency} 
                                    onChange={(e) => setViewCurrency(e.target.value)}
                                    className="w-full bg-slate-900 border border-slate-700 text-slate-300 text-sm rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500"
                                >
                                    <option value="INR">🇮🇳 INR (₹)</option>
                                    <option value="USD">🇺🇸 USD ($)</option>
                                    <option value="EUR">🇪🇺 EUR (€)</option>
                                    <option value="GBP">🇬🇧 GBP (£)</option>
                                </select>
                            </div>
                            
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 py-3 rounded-xl text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-colors text-sm font-medium border border-transparent hover:border-red-500/20">
                                Logout Workspace
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 h-full overflow-y-auto pt-16 md:pt-0 bg-[#0f172a]">
                        <div className="p-4 md:p-8 max-w-5xl mx-auto space-y-8">
                            
                            {uiError && (
                                <div className="bg-slate-800 border border-indigo-500/50 text-indigo-400 px-4 py-3 rounded-xl flex items-center gap-3">
                                    {renderIcon('sparkles', "w-5 h-5")}
                                    <p className="text-sm font-medium">{uiError}</p>
                                </div>
                            )}

                            {/* --- TRIP HUB TAB --- */}
                            {activeTab === 'hub' && (
                                <div className="space-y-6">
                                    <div className="bg-gradient-to-br from-indigo-900/50 to-blue-900/50 border border-indigo-500/30 rounded-2xl p-8 text-center relative overflow-hidden">
                                        <div className="absolute -right-10 -bottom-10 text-white/5 w-64 h-64">{renderIcon('camera', 'w-full h-full')}</div>
                                        <h2 className="text-3xl font-black text-white mb-2 relative z-10">Trip Photo Gallery</h2>
                                        <p className="text-indigo-200 mb-8 max-w-lg mx-auto relative z-10">Access our 5TB shared Google Drive! You can instantly upload your photos and videos, or download the full trip collection.</p>
                                        
                                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4 relative z-10">
                                            <a href={GDRIVE_LINK} target="_blank" rel="noreferrer" className="w-full sm:w-auto flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-bold text-sm transition-all shadow-lg shadow-indigo-600/20">
                                                {renderIcon('upload', 'w-5 h-5')} Upload Media
                                            </a>
                                            <a href={GDRIVE_LINK} target="_blank" rel="noreferrer" className="w-full sm:w-auto flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-8 py-4 rounded-xl font-bold text-sm transition-all shadow-lg">
                                                {renderIcon('camera', 'w-5 h-5')} View & Download
                                            </a>
                                        </div>
                                    </div>

                                    {/* AI Insights Card */}
                                    <div className="bg-gradient-to-r from-fuchsia-900/40 to-purple-900/40 border border-fuchsia-500/30 rounded-2xl p-8 relative overflow-hidden">
                                        <div className="absolute -left-10 -bottom-10 text-white/5 w-64 h-64">{renderIcon('sparkles', 'w-full h-full')}</div>
                                        <div className="flex flex-col md:flex-row gap-6 relative z-10">
                                            <div className="flex-1">
                                                <h3 className="text-xl font-bold text-white mb-2 flex items-center gap-2">
                                                    {renderIcon('sparkles', 'w-6 h-6 text-fuchsia-400')}
                                                    AI Financial Advisor
                                                </h3>
                                                <p className="text-fuchsia-200 text-sm mb-4">Let Gemini AI analyze your trip expenses and give you a fun, witty breakdown of your group's spending habits!</p>
                                                
                                                {aiInsights ? (
                                                    <div className="space-y-3 mt-6 bg-slate-900/50 p-6 rounded-xl border border-fuchsia-500/20 text-slate-300 text-sm leading-relaxed">
                                                        {aiInsights.split('\n').map((para, idx) => (
                                                            <p key={idx}>{para}</p>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <button 
                                                        onClick={handleGenerateInsights} 
                                                        disabled={isGeneratingInsights}
                                                        className="flex items-center gap-2 bg-fuchsia-600 hover:bg-fuchsia-500 disabled:opacity-50 text-white px-6 py-3 rounded-xl font-bold transition-colors shadow-lg shadow-fuchsia-600/20"
                                                    >
                                                        {isGeneratingInsights ? "✨ Analyzing Data..." : "✨ Generate Trip Insights"}
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-8 flex flex-col md:flex-row items-center justify-between gap-6">
                                        <div>
                                            <h3 className="text-xl font-bold text-white mb-1">Save Trip Data</h3>
                                            <p className="text-slate-400 text-sm">Download a complete Excel/CSV report containing all expenses, totals, and "who owes who" settlements.</p>
                                        </div>
                                        <button onClick={handleExportCSV} className="w-full md:w-auto flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold transition-colors shadow-lg shadow-emerald-600/20 whitespace-nowrap">
                                            {renderIcon('download', 'w-5 h-5')} Export Total Summary
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* --- ADMIN TAB --- */}
                            {activeTab === 'admin' && loggedInUser.role === 'admin' && (
                                <div className="space-y-6">
                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-6">
                                        <h2 className="text-lg font-bold text-white mb-4">Create User Credentials</h2>
                                        <form onSubmit={handleCreateFriend} className="flex flex-col sm:flex-row gap-4">
                                            <input type="text" required value={newFriend.username} onChange={e => setNewFriend({...newFriend, username: e.target.value})} placeholder="Friend's Username" className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white" />
                                            <input type="text" required value={newFriend.password} onChange={e => setNewFriend({...newFriend, password: e.target.value})} placeholder="Create Password" className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 text-white" />
                                            <button type="submit" className="bg-amber-600 hover:bg-amber-500 text-white px-6 py-3 rounded-xl font-bold transition-colors">Add User</button>
                                        </form>
                                    </div>
                                    
                                    <div className="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
                                        <div className="p-4 border-b border-slate-700 bg-slate-800/80"><h3 className="font-bold text-white">All Active Accounts</h3></div>
                                        <ul className="divide-y divide-slate-700">
                                            {appUsers.map(u => (
                                                <li key={u.id} className="p-4 flex justify-between items-center hover:bg-slate-800 transition-colors">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-bold text-white overflow-hidden">
                                                            {u.avatar ? <img src={u.avatar} className="w-full h-full object-cover" /> : u.username.substring(0,2).toUpperCase()}
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-white flex items-center gap-2">
                                                                {u.username}
                                                                {u.role === 'admin' && <span className="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20 uppercase">Admin</span>}
                                                            </p>
                                                            <p className="text-xs text-slate-500 mt-1 font-mono">PWD: {u.role === 'admin' ? '********' : u.password}</p>
                                                        </div>
                                                    </div>
                                                    {u.role !== 'admin' && (
                                                        <button onClick={() => handleDeleteUser(u.id)} className="p-2 text-slate-500 hover:text-red-400 bg-slate-900 rounded-lg border border-slate-700 hover:border-red-500/50 transition-colors">
                                                            {renderIcon('trash', 'w-5 h-5')}
                                                        </button>
                                                    )}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            )}

                            {/* --- EXPENSE TABS --- */}
                            {(activeTab === 'group' || activeTab === 'personal') && (
                                <div className="grid xl:grid-cols-3 gap-8">
                                    
                                    {/* Left Column (Input & Summary) */}
                                    <div className="xl:col-span-1 space-y-6">
                                        
                                        <div className="bg-slate-800/50 border border-slate-700 rounded-2xl overflow-hidden">
                                            <div className="p-5 border-b border-slate-700 bg-slate-800/80 flex justify-between items-center">
                                                <h2 className="font-bold text-white flex items-center gap-2">
                                                    {renderIcon('plus', "w-5 h-5 text-blue-400")}
                                                    {activeTab === 'personal' ? 'Add Personal Expense' : 'Add Group Expense'}
                                                </h2>
                                                
                                                {/* Gemini Vision Receipt Scanner Button */}
                                                <label className={`cursor-pointer flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${isAnalyzingReceipt ? 'bg-indigo-500/20 text-indigo-300 cursor-wait' : 'bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600/40 border border-indigo-500/30'}`}>
                                                    {renderIcon('sparkles', 'w-3 h-3')}
                                                    {isAnalyzingReceipt ? 'Analyzing...' : 'Scan Receipt'}
                                                    <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleReceiptUpload} disabled={isAnalyzingReceipt} />
                                                </label>
                                            </div>
                                            <div className="p-5">
                                                <form onSubmit={handleAddExpense} className="space-y-4">
                                                    {activeTab === 'group' && (
                                                        <div>
                                                            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Who paid?</label>
                                                            {loggedInUser.role === 'admin' ? (
                                                                <select value={newExpense.paidBy} onChange={(e) => setNewExpense({...newExpense, paidBy: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 text-white appearance-none">
                                                                    <option value="">Select someone...</option>
                                                                    {appUsers.map(u => <option key={u.id} value={u.username}>{u.username}</option>)}
                                                                </select>
                                                            ) : (
                                                                <div className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-400 flex items-center gap-2">
                                                                    {renderIcon('shield', 'w-4 h-4 text-blue-500')} 
                                                                    {loggedInUser.username} <span className="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-500 ml-auto">Auto</span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                    
                                                    <div>
                                                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Amount ({CURRENCY_SYMBOLS[viewCurrency]})</label>
                                                        <input type="number" min="0.01" step="0.01" value={newExpense.amount} onChange={(e) => setNewExpense({...newExpense, amount: e.target.value})} placeholder="0.00" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 text-white" required />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Description</label>
                                                        <input type="text" value={newExpense.description} onChange={(e) => setNewExpense({...newExpense, description: e.target.value})} placeholder={activeTab === 'group' ? "Dinner, Taxi..." : "Souvenir..."} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 text-white" required />
                                                    </div>
                                                    <button type="submit" className={`w-full py-3 rounded-xl font-bold transition-all shadow-lg text-white ${activeTab === 'personal' ? 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-500/20' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/20'}`}>
                                                        Save Expense
                                                    </button>
                                                </form>
                                            </div>
                                        </div>

                                        {/* Total Spent Widget */}
                                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-6 border border-slate-700 shadow-xl relative overflow-hidden">
                                            <div className="absolute -right-6 -top-6 text-slate-700/30 w-32 h-32">{renderIcon('wallet', 'w-full h-full')}</div>
                                            <h3 className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2 relative z-10">Total Group Spend</h3>
                                            <p className="text-4xl font-black text-white relative z-10">{formatAmount(groupTotal)}</p>
                                        </div>

                                        {/* SETTLEMENTS CALCULATOR */}
                                        {activeTab === 'group' && groupTotal > 0 && settlements.length > 0 && (
                                            <div className="bg-emerald-900/20 border border-emerald-500/30 rounded-2xl overflow-hidden">
                                                <div className="bg-emerald-900/40 px-5 py-3 border-b border-emerald-500/20">
                                                    <h3 className="text-xs font-bold text-emerald-400 uppercase tracking-wider">Who Owes Who</h3>
                                                </div>
                                                <div className="p-4 space-y-3">
                                                    {settlements.map((s, idx) => (
                                                        <div key={idx} className="flex items-center justify-between text-sm bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                                                            <div className="flex items-center gap-2">
                                                                <span className="font-bold text-rose-400">{s.from}</span>
                                                                {renderIcon('arrow', 'w-4 h-4 text-slate-500')}
                                                                <span className="font-bold text-emerald-400">{s.to}</span>
                                                            </div>
                                                            <span className="font-black text-white">{formatAmount(s.amount)}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Right Column (Feed) */}
                                    <div className="xl:col-span-2">
                                        <div className="bg-slate-800/30 border border-slate-700 rounded-2xl overflow-hidden flex flex-col min-h-[500px]">
                                            <div className="px-6 py-5 border-b border-slate-700 bg-slate-800/80 flex justify-between items-center">
                                                <h2 className="font-bold text-white">Recent Transactions</h2>
                                                <span className="bg-slate-900 text-slate-400 text-xs font-bold px-3 py-1 rounded-full border border-slate-700">
                                                    {visibleExpenses.length} records
                                                </span>
                                            </div>
                                            
                                            <div className="flex-1 overflow-y-auto">
                                                {visibleExpenses.length === 0 ? (
                                                    <div className="flex flex-col items-center justify-center h-full py-20 text-slate-500">
                                                        <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                                                            {renderIcon('wallet', 'w-8 h-8 opacity-50')}
                                                        </div>
                                                        <p>No expenses recorded yet.</p>
                                                    </div>
                                                ) : (
                                                    <ul className="divide-y divide-slate-700/50">
                                                        {visibleExpenses.map((expense) => {
                                                            const payerName = expense.paidBy || expense.paid_by || '?';
                                                            const payerUser = appUsers.find(u => u.username === payerName);
                                                            const avatarSrc = payerUser?.avatar;
                                                            
                                                            const formattedDateTime = new Date(expense.timestamp).toLocaleString(undefined, { 
                                                                year: 'numeric', month: 'short', day: 'numeric', 
                                                                hour: '2-digit', minute: '2-digit' 
                                                            });

                                                            return (
                                                                <li key={expense.id} className="p-5 hover:bg-slate-800/50 transition-colors flex flex-col sm:flex-row sm:items-center justify-between group gap-4">
                                                                    <div className="flex items-start gap-4">
                                                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-bold text-sm uppercase shrink-0 shadow-lg overflow-hidden ${expense.type === 'personal' ? 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30' : 'bg-blue-500/20 text-blue-400 border border-blue-500/30'}`}>
                                                                            {avatarSrc ? <img src={avatarSrc} className="w-full h-full object-cover" /> : payerName.substring(0, 2)}
                                                                        </div>
                                                                        <div>
                                                                            <p className="font-bold text-white text-lg">{expense.description}</p>
                                                                            <p className="text-xs text-slate-400 mt-1">
                                                                                {expense.type === 'personal' ? 'Personal by' : 'Paid by'} <span className="font-medium text-slate-300">{payerName}</span> • {formattedDateTime}
                                                                            </p>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto pl-16 sm:pl-0">
                                                                        <span className="font-black text-white text-xl tracking-tight">
                                                                            {formatAmount(expense.amount)}
                                                                        </span>
                                                                        
                                                                        {loggedInUser.role === 'admin' && (
                                                                            <button onClick={() => handleDeleteExpense(expense.id)} className="text-slate-600 hover:text-red-400 bg-slate-900 p-2.5 rounded-xl border border-slate-800 hover:border-red-500/30 transition-all opacity-0 group-hover:opacity-100 hidden sm:block">
                                                                                {renderIcon('trash', 'w-5 h-5')}
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                    {loggedInUser.role === 'admin' && (
                                                                        <button onClick={() => handleDeleteExpense(expense.id)} className="w-full text-red-400 bg-red-500/10 p-2 rounded-lg border border-red-500/20 mt-2 sm:hidden text-sm font-bold flex justify-center gap-2 items-center">
                                                                            {renderIcon('trash', 'w-4 h-4')} Delete Record
                                                                        </button>
                                                                    )}
                                                                </li>
                                                            );
                                                        })}
                                                    </ul>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
