<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMoney - Trip Tracker</title>
  
  <!-- Tailwind CSS for Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Maps to load React and Supabase directly in the browser -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.38.4"
      }
    }
  </script>
  
  <!-- Babel to compile React JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Main Application Code -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Trash2, UserPlus, Shield, Lock, PlusCircle, Users, AlertCircle, LogOut, Wallet, UserCircle, Eye, Coins } from 'lucide-react';
    import { createClient } from '@supabase/supabase-js';

    // ==========================================
    // 🔴 PASTE YOUR SUPABASE URL AND KEY BELOW 🔴
    // ==========================================
    const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
    // ==========================================

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Currency Configuration
    const EXCHANGE_RATES = { INR: 1, USD: 0.012, EUR: 0.011, GBP: 0.0095 };
    const CURRENCY_SYMBOLS = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };

    function App() {
      // State
      const [appUsers, setAppUsers] = useState([]); 
      const [expenses, setExpenses] = useState([]);
      const [dataLoaded, setDataLoaded] = useState(false);
      const [loggedInUser, setLoggedInUser] = useState(null); 
      const [loginForm, setLoginForm] = useState({ username: '', password: '' });
      const [setupForm, setSetupForm] = useState({ username: '', password: '' });
      const [authError, setAuthError] = useState('');
      const [activeTab, setActiveTab] = useState('group'); 
      const [newExpense, setNewExpense] = useState({ amount: '', description: '', paidBy: '' });
      const [newFriend, setNewFriend] = useState({ username: '', password: '' });
      const [uiError, setUiError] = useState('');
      const [viewCurrency, setViewCurrency] = useState('INR'); 

      // Fetch Data & Listen for Realtime Changes
      useEffect(() => {
        const fetchData = async () => {
          const { data: usersData } = await supabase.from('app_users').select('*');
          if (usersData) setAppUsers(usersData);

          const { data: expData } = await supabase.from('expenses').select('*').order('timestamp', { ascending: false });
          if (expData) setExpenses(expData);
          
          setDataLoaded(true);
        };

        fetchData();

        // Realtime Subscriptions
        const usersSub = supabase.channel('users_channel')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'app_users' }, fetchData)
          .subscribe();

        const expensesSub = supabase.channel('expenses_channel')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, fetchData)
          .subscribe();

        return () => {
          supabase.removeChannel(usersSub);
          supabase.removeChannel(expensesSub);
        };
      }, []);

      // Actions
      const handleSetupAdmin = async (e) => {
        e.preventDefault();
        setAuthError('');
        try {
          const { data, error } = await supabase.from('app_users').insert([{
            username: setupForm.username.trim(),
            password: setupForm.password,
            role: 'admin',
            created_at: Date.now()
          }]).select();
          
          if (error) throw error;
